name: CI

# Green-checkmark gate on every push/PR to main: byte-compile the package,
# smoke-test the CLI, and verify the Docker image still builds. Releases run
# independently through release.yml on version tags.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: debeski/composer

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Byte-compile package
        run: python -m compileall composer

      - name: CLI smoke test
        run: |
          python -m composer --version
          python -m composer --help | grep -- '--purge'

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (load for testing)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE }}:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Runtime smoke tests
        run: ./scripts/smoke-test.sh ${{ env.IMAGE }}:ci-test
